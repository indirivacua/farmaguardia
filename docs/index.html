<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a1a1a" />
  <title>FarmaGuardia LP · Farmacias de Turno en La Plata</title>
  <meta name="description" content="Encontrá la farmacia de turno más cercana en La Plata, Los Hornos y Zona Norte." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <link rel="stylesheet" href="styles.css" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f4c3a'/%3E%3Cpath d='M42 22h16v20h20v16H58v20H42V58H22V42h20V22z' fill='%23f7e07a'/%3E%3C/svg%3E" />
</head>
<body>

  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>

  <header>
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M42 18h16v20h20v16H58v28c0 8-8 12-8 12s-8-4-8-12V54H22V38h20V18z" fill="#f7e07a"/>
          <circle cx="50" cy="35" r="4" fill="#0f4c3a"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>Farma<span>Guardia</span> LP</h1>
        <p>Farmacias de turno · La Plata</p>
      </div>
    </div>

    <div class="head-right">
      <button class="icon-btn" id="btn-locate" title="Mostrar mi ubicación" aria-label="Mostrar mi ubicación" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <circle cx="12" cy="12" r="8"/>
        </svg>
      </button>
      <button class="icon-btn" id="btn-refresh" title="Volver a scrapear la web ahora" aria-label="Refrescar datos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
        </svg>
      </button>
      <div class="clock">
        <div class="clock-pulse"></div>
        <div class="clock-text">
          <small>En vivo</small>
          <span id="clock-time">--:--</span>
        </div>
      </div>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar" id="sidebar" data-state="expanded">
      <!-- Handle de arrastre (solo visible en mobile) -->
      <div class="sheet-handle" id="sheet-handle" aria-hidden="true">
        <span></span>
      </div>

      <div class="sidebar-top">
        <div class="stats">
          <div class="count" id="stat-count">—</div>
          <div class="label"><em id="stat-filtered">farmacias</em> abiertas ahora</div>
          <div class="source-meta" id="source-meta">Cargando desde colfarmalp.org.ar…</div>
        </div>

        <div class="filters">
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
            </svg>
            <input type="search" id="search" placeholder="Buscar por nombre, calle…" autocomplete="off" inputmode="search" />
          </div>
          <div class="zones" id="zones">
            <button class="zone-chip active" data-zone="all">Todas</button>
            <button class="zone-chip" data-zone="La Plata"><span class="dot"></span>La Plata</button>
            <button class="zone-chip" data-zone="Norte"><span class="dot"></span>Norte</button>
            <button class="zone-chip" data-zone="Los Hornos"><span class="dot"></span>Los Hornos</button>
          </div>
        </div>
      </div>

      <div class="list" id="list">
        <div class="state-msg"><span class="big">⏳</span>Scrapeando colfarmalp.org.ar…</div>
      </div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>

      <div class="info-banner" id="banner">
        <button aria-label="Cerrar" id="banner-close">✕</button>
        <strong>Datos en vivo</strong>
        Scrapeados desde <a href="https://www.colfarmalp.org.ar/turnos-la-plata/" target="_blank" rel="noopener">colfarmalp.org.ar</a>. Tocá "Refrescar" para actualizar.
      </div>

      <div class="map-legend" id="map-legend">
        <h4>Zonas</h4>
        <div class="legend-item"><span class="dot" style="background:#0f4c3a"></span>La Plata</div>
        <div class="legend-item"><span class="dot" style="background:#5b8fb5"></span>Zona Norte</div>
        <div class="legend-item"><span class="dot" style="background:#e94f3a"></span>Los Hornos</div>
      </div>

      <!-- FAB "Ver lista" (solo mobile cuando el bottom sheet está colapsado) -->
      <button class="fab fab-list" id="fab-list" aria-label="Ver lista de farmacias">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        <span id="fab-list-count">0</span>
      </button>
    </div>
  </div>

  <!-- Toast global para mensajes efímeros -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
