name: Scrape farmacias
on:
  schedule:
    - cron: '0 * * * *'  # cada hora
  workflow_dispatch:      # también manual desde la UI
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: mkdir -p docs/data
      - run: python app.py --dump docs/data/farmacias.json
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: actualización automática'
          file_pattern: 'docs/data/farmacias.json'
